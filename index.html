<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">


<title>Logística ADHEPLAST</title>


<style>

body {
    margin:0;
    font-family:"Segoe UI", Arial, sans-serif;
    background:#0f172a;
    color:white;
}


.container {

    max-width:1200px;
    margin:auto;
    padding:20px;

}


.header {

    text-align:center;
    margin-bottom:25px;

}


.header img {

    width:220px;
    max-width:90%;

}


.header h1 {

    font-size:32px;
    margin:10px 0;

}


.meta {

    color:#22c55e;
    font-size:18px;

}



.cards {

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

    margin-bottom:25px;

}



.card {

    background:#1e293b;

    border-radius:15px;

    padding:20px;

    text-align:center;

}



.card .valor {

    font-size:35px;

    font-weight:bold;

    color:#38bdf8;

}



.card div:last-child {

    margin-top:8px;

    color:#cbd5e1;

}




.bodegas {

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:15px;

}




.bodega {

    background:#1e293b;

    border-radius:15px;

    padding:20px;

}




.bodega-title {

    color:#38bdf8;

    font-size:20px;

    font-weight:bold;

    margin-bottom:15px;

}



.indicador {

    margin-bottom:12px;

}


.indicador span {

    display:block;

    font-size:13px;

    color:#94a3b8;

    margin-bottom:5px;

}




.progress {

    background:#334155;

    height:24px;

    border-radius:20px;

    overflow:hidden;

}



.bar {

    height:24px;

    line-height:24px;

    text-align:right;

    padding-right:8px;

    font-size:12px;

    font-weight:bold;

}



.btn {

    margin-top:15px;

    width:100%;

    padding:10px;

    border:none;

    border-radius:8px;

    background:#0284c7;

    color:white;

    font-weight:bold;

    cursor:pointer;

}



.btn:hover {

    background:#0369a1;

}




#detalle {

    display:none;

    background:#1e293b;

    padding:20px;

    border-radius:15px;

    margin-top:20px;

}



table {

    width:100%;

    border-collapse:collapse;

}



th {

    background:#334155;

    padding:10px;

}



td {

    padding:10px;

    border-bottom:1px solid #475569;

}




.footer {

    text-align:center;

    margin-top:30px;

    color:#94a3b8;

}




@media(max-width:600px){

.header h1{

font-size:24px;

}


.card .valor{

font-size:28px;

}


}


</style>


</head>


<body>


<div class="container">


<div class="header">


<img src="LOGO ADHEPLAST.png"
alt="ADHEPLAST">


<h1>
LOGÍSTICA ADHEPLAST
</h1>


<div class="meta">

META CORPORATIVA:
ENTREGAS EN 24 HORAS ≥ 85%

</div>


</div>




<div class="cards">


<div class="card">

<div class="valor" id="cumplen">
0/10
</div>

<div>
Bodegas cumplen meta
</div>

</div>



<div class="card">

<div class="valor" id="promedio">
0%
</div>

<div>
Promedio nacional 24 horas
</div>

</div>



<div class="card">

<div class="valor" id="mejor">
-
</div>

<div>
Mejor bodega
</div>

</div>



</div>




<div id="bodegas"
class="bodegas">

</div>



<div id="detalle">


<h2 id="tituloDetalle">

Facturas pendientes

</h2>


<table>


<thead>

<tr>

<th>
Fecha
</th>

<th>
Comprobante
</th>

<th>
Cliente
</th>

<th>
Ciudad
</th>


</tr>

</thead>


<tbody id="tablaDetalle">


</tbody>


</table>


<button class="btn"
onclick="cerrarDetalle()">

← Regresar

</button>


</div>



<div class="footer">

Actualización automática - Dashboard Logístico ADHEPLAST

</div>



</div>
            Actualización automática
        </div>
    </div>
    
    <script>
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBMatUrloxIOHlTpa2Wq4pMcI345n5L7p5hxXa2KllNIUgF2b6CJD0fHO7F9XM7d2pmQsYYnbXCKDX/pub?output=csv";
        
        // Función auxiliar para definir colores según el cumplimiento
        function obtenerColor(valor) {
            if(valor >= 85) return "#22c55e"; // Verde
            if(valor >= 80) return "#f59e0b"; // Amarillo/Naranja
            return "#ef4444"; // Rojo
        }
        
        fetch(urlCSV)
        .then(r => r.text())
        .then(csv => {
            const filas = csv.trim().split(/\r?\n/);
            
            let total24 = 0;
            let cumplen24 = 0;
            let mejorNombre24 = "";
            let mejorValor24 = 0;
            let cantidadValida = 0;
            
            const contenedor = document.getElementById("bodegas");
            contenedor.innerHTML = ""; 
            
            filas.slice(1).forEach(fila => {
                const c = fila.split(",");
                
                if(c.length < 2) return;
                
                const nombre = c[0].trim();
                const v24 = parseFloat(c[1]);
                const v48 = c[2] ? parseFloat(c[2]) : 0;
                const v72 = c[3] ? parseFloat(c[3]) : 0;
                
                if(isNaN(v24)) return;
                
                cantidadValida++;
                total24 += v24;
                
                if(v24 >= 85) cumplen24++;
                
                if(v24 > mejorValor24){
                    mejorValor24 = v24;
                    mejorNombre24 = nombre;
                }
                
                // Colores individuales para cada barra de la bodega
                let color24 = obtenerColor(v24);
                let color48 = obtenerColor(v48);
                let color72 = obtenerColor(v72);
                
                // Formatear texto para las barras si no son números válidos
                let txt24 = isNaN(v24) ? "0%" : v24 + "%";
                let txt48 = isNaN(v48) ? "0%" : v48 + "%";
                let txt72 = isNaN(v72) ? "0%" : v72 + "%";
                
                // Agregar la bodega con sus 3 barras de indicadores
                contenedor.innerHTML += `
                <div class="bodega">
                    <div class="bodega-title">     <a href="https://docs.google.com/spreadsheets/d/1pOxXiuabQ5kiOLzhQo5oJZjqA0LVW-NbccPrbGxvKEA/edit#gid=1111907883"        target="_blank"        style="color:#38bdf8;text-decoration:none;">        ${nombre}     </a> </div>
                    
                    <div class="indicador-block">
                        <span class="indicador-label">Entregas en 24 Horas</span>
                        <div class="progress">
                            <div class="bar" style="width:${isNaN(v24)?0:v24}%;background:${color24}">
                                ${txt24}
                            </div>
                        </div>
                    </div>
                    
                    <div class="indicador-block">
                        <span class="indicador-label">Entregas en 48 Horas</span>
                        <div class="progress">
                            <div class="bar" style="width:${isNaN(v48)?0:v48}%;background:${color48}">
                                ${txt48}
                            </div>
                        </div>
                    </div>
                    
                    <div class="indicador-block">
                        <span class="indicador-label">Entregas en 72 Horas</span>
                        <div class="progress">
                            <div class="bar" style="width:${isNaN(v72)?0:v72}%;background:${color72}">
                                ${txt72}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            });
            
            // Las tarjetas superiores siguen midiendo la meta principal (24 horas)
            document.getElementById("cumplen").innerText = cumplen24 + " / " + cantidadValida;
            document.getElementById("promedio").innerText = (cantidadValida > 0 ? (total24/cantidadValida).toFixed(1) : 0) + "%";
            document.getElementById("mejor").innerText = mejorNombre24 || "-";
        })
        .catch(error => {
            console.error(error);
            document.getElementById("bodegas").innerHTML = "<h2>Error al leer Google Sheets</h2>";
        });
    </script>
</body>
</html>
